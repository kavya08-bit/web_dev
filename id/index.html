<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Business Card</title>
    <link href="styles.css" rel="stylesheet"/>
</head>

<body>
    <div class="business-card">
        <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg" alt="flower image">
        <p class="full-name">Your Name</p>
        <p class="designation">Software Developer</p>
        <p class="company">your company</p>

        <hr>
        <p>Email: your-email@example.com</p>
        <p>Phone: (123) 456-7890</p>
        <a class="portfolio-link" href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-business-card/design-a-business-card">Portfolio</a>
        <hr>
        <div class="social-media">
            <h2>Connect with me</h2>
            <a href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-business-card/design-a-business-card">Twitter</a>
            <a href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-business-card/design-a-business-card">LinkedIn</a>
            <a href="https://www.freecodecamp.org/learn/responsive-web-design-v9/lab-business-card/design-a-business-card">GitHub</a>
        </div>
        </div>



</body>

</html>
